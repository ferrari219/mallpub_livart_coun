<script>
	$('.tabs-step ul li').each(function (index, element) {
		$(element).not('.is-active').addClass('is-done');
		if ($(this).is('.is-active')) {
			$(element).addClass('is-done');
			return false;
		}
	});
	$('.tabs-step ul li a').on('click', function () {
		$(this).parent().addClass('is-active').siblings().removeClass('is-active');
		// tabPillActive();
	});
</script>
